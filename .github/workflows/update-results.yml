name: Update World Cup Results
on:
  schedule:
    - cron: '20 * * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  update-results:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm run update-results
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update World Cup results
